    <linearGradient id="metal"><stop stop-color="#9aa6bb"/><stop offset=".5" stop-color="#27344c"/><stop offset="1" stop-color="#bbc5d4"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
